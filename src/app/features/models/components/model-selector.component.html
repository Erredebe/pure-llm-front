<div class="selector">
  @for (model of models(); track model.id) {
    <button type="button" [class.active]="model.id === selectedModelId()" (click)="selected.emit(model.id)">
      <strong>{{ model.label }}</strong>
      <span>{{ model.family }} · {{ model.sizeGb }} GB</span>
    </button>
  }
</div>
